<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<style>
  body{width:250px;margin:0;padding:14px;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;font-size:13px;color:#1f2933}
  h1{font-size:14px;margin:0 0 8px}
  p{margin:0 0 10px;color:#3e4c59;line-height:1.4}
  .badge{display:inline-block;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:600}
  .badge.ok{background:#eaf7ef;color:#1f6d43}
  .badge.no{background:#fdecea;color:#c0392b}
  button{width:100%;padding:9px;border:none;border-radius:8px;background:#13538b;color:#fff;
    font-size:13px;font-weight:600;cursor:pointer;margin-top:4px}
  button:hover{background:#0e3f6b}
</style>
</head>
<body>
  <h1>🔧 Asistente de Taller IA</h1>
  <p>Estado: <span id="state" class="badge no">sin configurar</span></p>
  <p>El botón <b>"Generar ficha de trabajo"</b> aparece en la esquina de la página de ALLDATA.</p>
  <button id="cfg">Abrir configuración de IA</button>
  <script src="popup.js"></script>
</body>
</html>
