<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente SA — Configurar IA</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; color: #1f2b39; max-width: 560px; margin: 30px auto; padding: 0 18px; }
    h1 { font-size: 18px; }
    p.note { color: #56657a; font-size: 13px; }
    label { display: block; font-weight: 600; font-size: 13px; margin: 14px 0 4px; }
    input, select { width: 100%; padding: 9px 10px; border: 1px solid #cdd7e3; border-radius: 8px; font-size: 14px; }
    button { margin-top: 18px; background: #18b3c6; border: none; color: #06303a; font-weight: 700; padding: 10px 16px; border-radius: 8px; cursor: pointer; }
    button:hover { background: #128fa0; color: #fff; }
    .status { margin-top: 12px; font-size: 13px; }
    .status.ok { color: #28b06a; } .status.err { color: #e5484d; }
    .hide { display: none; }
  </style>
</head>
<body>
  <h1>Revisión de gramática con IA (opcional)</h1>
  <p class="note">Solo se usa para corregir la ortografía/gramática de las notas de los técnicos dentro de un RO. Si ya configuraste el <b>Asistente de Taller IA</b>, puedes usar la misma clave aquí. La clave se guarda solo en esta computadora.</p>

  <label for="provider">Proveedor</label>
  <select id="provider">
    <option value="openai">OpenAI / compatible (gpt-4o-mini, etc.)</option>
    <option value="anthropic">Anthropic (Claude)</option>
  </select>

  <div id="baseUrlWrap">
    <label for="baseUrl">URL base (solo OpenAI/compatible)</label>
    <input id="baseUrl" placeholder="https://api.openai.com/v1">
  </div>

  <label for="model">Modelo</label>
  <input id="model" placeholder="gpt-4o-mini">

  <label for="apiKey">API key</label>
  <input id="apiKey" type="password" placeholder="sk-...">

  <button id="save">Guardar y probar</button>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
